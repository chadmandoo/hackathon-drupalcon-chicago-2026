langcode: en
status: true
dependencies: {  }
id: content_planning
label: 'Content Planning'
title: 'Plan upcoming content'
description: 'Plan content for the coming week based on category gaps, trends, and editorial calendar.'
arguments:
  -
    label: 'Time period'
    machine_name: period
    description: 'Planning period (e.g., "this week", "next 5 days")'
    required: false
messages:
  -
    role: user
    content:
      -
        type: text
        text: |-
          I want to plan content for: {{period}}

          Please:
          1. Run site_analytics to see what categories have been covered recently and where there are gaps
          2. Run editorial_dashboard to see the current content pipeline (drafts, in review)
          3. Run taxonomy_manager with action=list to see all categories and their article counts
          4. Based on this data, suggest 5-7 article ideas that would:
             - Fill coverage gaps (underrepresented categories)
             - Build on trending topics
             - Mix news and opinion pieces
          5. For each suggestion, give me: headline, category, 1-sentence pitch, and suggested author

          Present this as an editorial calendar I can approve and then we can start drafting.